<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0A0A"/>
      <stop offset="0.5" stop-color="#1A1A2E"/>
      <stop offset="1" stop-color="#0A0A0F"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#66E5FF"/>
      <stop offset="1" stop-color="#00A3CC"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#00D4FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#00D4FF" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="700" ry="350" fill="url(#glow)"/>

  <!-- Wind streaks -->
  <g opacity="0.4">
    <line x1="50" y1="120" x2="220" y2="120" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>
    <line x1="80" y1="180" x2="180" y2="180" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.3"/>
    <line x1="60" y1="240" x2="200" y2="240" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/>
    <line x1="980" y1="430" x2="1140" y2="430" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.35"/>
    <line x1="1010" y1="490" x2="1130" y2="490" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.25"/>
  </g>

  <!-- Brand badge -->
  <g transform="translate(600 220)">
    <rect x="-150" y="-26" width="300" height="52" rx="26" fill="rgba(0,212,255,0.05)" stroke="#00D4FF" stroke-opacity="0.3"/>
    <text x="0" y="6" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="500" fill="#00D4FF" text-anchor="middle" letter-spacing="2">IMMERSIVE CYCLING</text>
  </g>

  <!-- CRITICAL wordmark -->
  <text x="600" y="380" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="148" font-weight="800" fill="url(#brand)" text-anchor="middle" letter-spacing="-4">CRITICAL</text>

  <!-- Tagline -->
  <text x="600" y="450" font-family="-apple-system, system-ui, sans-serif" font-size="34" font-weight="300" fill="#FFFFFF" fill-opacity="0.85" text-anchor="middle" letter-spacing="6">FEEL THE WIND. OWN THE RIDE.</text>

  <!-- Four pillars -->
  <g font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="400" fill="#A0A0B0" text-anchor="middle">
    <text x="380" y="540">风</text>
    <text x="510" y="540">·</text>
    <text x="540" y="540">光</text>
    <text x="660" y="540">·</text>
    <text x="690" y="540">声</text>
    <text x="810" y="540">·</text>
    <text x="840" y="540">雾</text>
  </g>

  <!-- Domain -->
  <text x="600" y="600" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="16" fill="#6B6B80" text-anchor="middle" letter-spacing="2">zcritical.co</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0A0A"/>
      <stop offset="1" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#66E5FF"/>
      <stop offset="1" stop-color="#00A3CC"/>
    </linearGradient>
  </defs>
  <!-- Apple uses opaque squircles; corner radius 22% per HIG -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <text x="90" y="131" font-family="-apple-system, system-ui, sans-serif" font-size="124" font-weight="800" fill="url(#brand)" text-anchor="middle" letter-spacing="-4">C</text>
</svg>

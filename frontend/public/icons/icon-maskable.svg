<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable icon: full bleed background, central 80% safe zone for the C glyph -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0A0A"/>
      <stop offset="1" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#66E5FF"/>
      <stop offset="1" stop-color="#00A3CC"/>
    </linearGradient>
  </defs>
  <!-- Full bleed (maskable spec requires no rounded corners — Android adaptive icon will mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Central 80% safe zone: C glyph stays within 102.4 .. 409.6 -->
  <text x="256" y="346" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="280" font-weight="800" fill="url(#brand)" text-anchor="middle" letter-spacing="-8">C</text>
</svg>

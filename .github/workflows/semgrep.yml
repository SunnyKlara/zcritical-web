name: Semgrep

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Re-run weekly so new public rules catch already-merged code.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: semgrep/semgrep:latest

    steps:
      - uses: actions/checkout@v5

      - name: Run Semgrep
        # `--config p/owasp-top-ten` and `p/javascript` are curated rule
        # packs maintained by Semgrep. `.semgrep.yml` adds our local rules.
        run: |
          semgrep ci \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --config p/expressjs \
            --config p/react \
            --config .semgrep.yml \
            --sarif --output=semgrep.sarif
        env:
          SEMGREP_RULES: ''

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

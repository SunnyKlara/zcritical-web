name: SBOM

# Generates a CycloneDX Software Bill of Materials for the monorepo on every
# push to main and on tagged releases. The artifact is uploaded to the run so
# we can satisfy supply-chain attestations (and feed it to SCA tools that
# don't natively read pnpm lockfiles).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Generate SBOM with Anchore Syft
        uses: anchore/sbom-action@v0
        with:
          path: '.'
          format: cyclonedx-json
          output-file: 'sbom.cyclonedx.json'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cyclonedx.json
          retention-days: 365
